syntax = "proto3";

package paxos.v1;

option go_package = "github.com/filmil/synod/proto/paxos/v1;paxosv1";

service PaxosService {
  // Prepare a proposal.
  rpc Prepare(PrepareRequest) returns (PromiseResponse) {}

  // Accept a proposal.
  rpc Accept(AcceptRequest) returns (AcceptedResponse) {}

  // Request to join the cluster.
  rpc JoinCluster(JoinClusterRequest) returns (JoinClusterResponse) {}

  // Used for continuously syncing up the view of agent identities.
  rpc Sync(SyncRequest) returns (SyncResponse) {}
}

message ProposalID {
  uint64 number = 1;
  string agent_id = 2;
}

message PrepareRequest {
  string agent_id = 1;
  ProposalID proposal_id = 2;
  uint64 ledger_index = 3; // Which slot we are preparing for
  string nonce = 4;
}

message PromiseResponse {
  string agent_id = 1;
  bool promised = 2;
  ProposalID highest_accepted_id = 3;
  bytes highest_accepted_value = 4;
}

message AcceptRequest {
  string agent_id = 1;
  ProposalID proposal_id = 2;
  uint64 ledger_index = 3;
  bytes value = 4;
  string nonce = 5;
}

message AcceptedResponse {
  string agent_id = 1;
  bool accepted = 2;
}

message JoinClusterRequest {
  string agent_id = 1;
  string host_port = 2;
}

message JoinClusterResponse {
  string agent_id = 1;
  bool success = 2;
  string message = 3;
}

message SyncRequest {
  string agent_id = 1;
  uint64 highest_ledger_index = 2;
}

message SyncResponse {
  string agent_id = 1;
  uint64 highest_ledger_index = 2;
  repeated string agent_ids = 3; // Simplified sync response
}
