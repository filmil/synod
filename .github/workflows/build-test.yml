name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/bazel-disk-cache
          ~/.cache/bazel-repository-cache
        key: ${{ runner.os }}-bazel-linux-amd64-${{ hashFiles('MODULE.bazel.lock', 'go.sum') }}
        restore-keys: |
          ${{ runner.os }}-bazel-linux-amd64-

    - name: Set up Bazel
      uses: bazelbuild/setup-bazelisk@v3

    - name: Build
      run: bazel build --disk_cache=~/.cache/bazel-disk-cache --repository_cache=~/.cache/bazel-repository-cache //...

    - name: Test
      run: bazel test --disk_cache=~/.cache/bazel-disk-cache --repository_cache=~/.cache/bazel-repository-cache //...
