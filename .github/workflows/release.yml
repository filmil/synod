name: Release Agent

on:
  schedule:
    # Run automatically once a month (1st of the month at 00:00 UTC)
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          release_branches: main

  build:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: linux-amd64
            platform: "@rules_go//go/toolchain:linux_amd64"
          - arch: darwin-amd64
            platform: "@rules_go//go/toolchain:darwin_amd64"
          - arch: darwin-arm64
            platform: "@rules_go//go/toolchain:darwin_arm64"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk-cache
            ~/.cache/bazel-repository-cache
          key: ${{ runner.os }}-bazel-${{ matrix.arch }}-${{ hashFiles('MODULE.bazel.lock', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-${{ matrix.arch }}-

      - name: Set up Bazel
        run: bazel version

      - name: Build Agent Binary
        run: |
          bazel build -c opt \
            --disk_cache=~/.cache/bazel-disk-cache \
            --repository_cache=~/.cache/bazel-repository-cache \
            --platforms=${{ matrix.platform }} \
            //cmd/agent

      - name: Prepare Artifact
        run: |
          cp bazel-bin/cmd/agent/agent_/agent synod-agent-${{ matrix.arch }}
          chmod +x synod-agent-${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: synod-agent-${{ matrix.arch }}
          path: synod-agent-${{ matrix.arch }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          files: artifacts/synod-agent-*
          generate_release_notes: true

      - name: Set up Bazel
        run: bazel version

      - name: Update pkg.go.dev
        run: bazel run //tools/ai/ping-pkg-go-dev -- ${{ needs.tag.outputs.new_tag }}
