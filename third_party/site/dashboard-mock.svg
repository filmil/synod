<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .header { fill: #2d2d2d; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      .sidebar { fill: #252526; }
      .text-primary { fill: #0d6efd; font-family: monospace; font-size: 14px; }
      .text-light { fill: #d4d4d4; font-family: monospace; font-size: 14px; }
      .text-muted { fill: #808080; font-family: monospace; font-size: 12px; }
      .text-success { fill: #198754; font-family: monospace; font-size: 14px; }
      .card-bg { fill: #2d2d2d; rx: 6; }
      .card-header { fill: #0d6efd; rx: 6; }
      .card-header-success { fill: #198754; rx: 6; }
    </style>
  </defs>

  <!-- Window Frame -->
  <rect width="100%" height="100%" rx="12" class="bg"/>
  <rect width="100%" height="40" class="header" rx="12"/>
  <rect width="100%" height="20" y="20" class="header"/>

  <!-- Mac Dots -->
  <circle cx="20" cy="20" r="6" class="dot-r"/>
  <circle cx="40" cy="20" r="6" class="dot-y"/>
  <circle cx="60" cy="20" r="6" class="dot-g"/>

  <!-- Sidebar -->
  <rect width="200" height="610" y="40" class="sidebar" />
  <text x="20" y="80" class="text-light" style="font-weight: bold; font-size: 16px;">SYNOD AGENT</text>
  
  <text x="20" y="120" class="text-primary">> Status</text>
  <text x="20" y="150" class="text-light">  KV Store</text>
  <text x="20" y="180" class="text-light">  Messages</text>
  <text x="20" y="210" class="text-light">  Peers</text>
  <text x="20" y="240" class="text-light">  User API</text>
  <text x="20" y="270" class="text-light">  System</text>
  <text x="20" y="300" class="text-light">  gRPC Status</text>

  <!-- Main Content Area -->
  <text x="240" y="80" class="text-light" style="font-size: 24px; font-weight: bold;">Status Dashboard</text>
  
  <!-- Agent Info Card -->
  <rect x="240" y="110" width="300" height="150" class="card-bg"/>
  <rect x="240" y="110" width="300" height="40" class="card-header"/>
  <text x="255" y="135" fill="#fff" style="font-family: monospace; font-weight: bold;">Agent Info</text>
  <text x="255" y="180" class="text-light">ID: <tspan class="text-muted">18d41-e94...</tspan></text>
  <text x="255" y="210" class="text-light">Name: Alice</text>
  <text x="255" y="240" class="text-light">Keys Count: 14</text>

  <!-- Participants Card -->
  <rect x="560" y="110" width="400" height="250" class="card-bg"/>
  <rect x="560" y="110" width="400" height="40" class="card-header-success"/>
  <text x="575" y="135" fill="#fff" style="font-family: monospace; font-weight: bold;">Participants (Peers)</text>
  
  <!-- Table Header -->
  <text x="575" y="180" class="text-muted">Name     | Address             | Status</text>
  <line x1="575" y1="190" x2="940" y2="190" stroke="#444" stroke-width="1"/>
  
  <text x="575" y="215" class="text-light">Alice    | localhost:50051     | <tspan class="text-success">Active</tspan></text>
  <text x="575" y="245" class="text-light">Bob      | localhost:50052     | <tspan class="text-success">Active</tspan></text>
  <text x="575" y="275" class="text-light">Charlie  | localhost:50053     | <tspan class="text-success">Active</tspan></text>
  <text x="575" y="305" class="text-light">Dave     | localhost:50054     | <tspan class="text-success">Active</tspan></text>
  <text x="575" y="335" class="text-light">Eve      | localhost:50055     | <tspan class="text-success">Active</tspan></text>

  <!-- Log Card -->
  <rect x="240" y="380" width="720" height="230" class="card-bg"/>
  <rect x="240" y="380" width="720" height="40" class="card-bg" fill="#444"/>
  <text x="255" y="405" fill="#fff" style="font-family: monospace; font-weight: bold;">Recent Operations Log</text>
  
  <text x="255" y="445" class="text-success">[OK]</text><text x="300" y="445" class="text-light"> CompareAndWrite(/system/config) -> Version 15</text>
  <text x="255" y="475" class="text-success">[OK]</text><text x="300" y="475" class="text-light"> AcquireLock(/app/_lockable/resource) -> Success</text>
  <text x="255" y="505" class="text-primary">[TX]</text><text x="300" y="505" class="text-light"> Paxos Phase 1: Prepare(req=23, key=/_internal/peers)</text>
  <text x="255" y="535" class="text-primary">[RX]</text><text x="300" y="535" class="text-light"> Paxos Phase 1b: Promise(req=23) from Bob</text>
  <text x="255" y="565" class="text-primary">[TX]</text><text x="300" y="565" class="text-light"> Paxos Phase 2: Accept(req=23, val=...)</text>
</svg>
